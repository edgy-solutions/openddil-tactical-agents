name: Docker Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-edge-faust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build edge-faust-detector
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./edge/faust/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/edge-faust-detector:latest
          target: production

  build-edge-restate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build edge-restate-detector
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./edge/restate/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/edge-restate-detector:latest
          target: production

  build-hub-projector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build hub-restate-projector
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./hub/projector/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hub-restate-projector:latest
          target: production
