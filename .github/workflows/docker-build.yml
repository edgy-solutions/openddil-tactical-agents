name: Docker Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

# All images publish under ghcr.io/edgy-solutions/openddil/<service>:latest.
# `${{ github.repository_owner }}` resolves to `edgy-solutions` for this repo.
# The openddil-demo base compose references each of these images directly.

jobs:
  # The Hero-scenario edge agent referenced by openddil-demo/docker-compose.yml
  # as `image: ghcr.io/edgy-solutions/openddil/faust-edge:latest`. Includes
  # the Phase 3.5 rolling-window agent (detection/windows.py).
  build-faust-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build faust-edge
        uses: docker/build-push-action@v4
        with:
          context: ./edge
          file: ./edge/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/faust-edge:latest

  # Legacy Faust detector (separate codepath from the Hero faust_edge agent
  # above). Kept building while consumers exist; not referenced by the demo
  # base compose today.
  build-edge-faust-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build edge-faust-detector
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./edge/faust/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/edge-faust-detector:latest
          target: production

  # Legacy Restate detector. Same situation as above.
  build-edge-restate-detector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build edge-restate-detector
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./edge/restate/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/edge-restate-detector:latest
          target: production

  # Hub-side Restate projector referenced by openddil-demo/docker-compose.yml
  # as `image: ghcr.io/edgy-solutions/openddil/hub-restate-projector:latest`.
  build-hub-restate-projector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build hub-restate-projector
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./hub/projector/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/hub-restate-projector:latest
          target: production

  # Regional aggregator (Phase 6b) referenced by openddil-demo/
  # docker-compose.yml as `image: ghcr.io/edgy-solutions/openddil/
  # faust-regional:latest` and by the openddil-helm chart. Previously this
  # image was ONLY built locally via docker-compose.override.yml's
  # `build:` block — compose-mode users never noticed it was absent from
  # ghcr.io, but helm deployments (which pull, not build) fail with
  # "faust-regional:latest: not found". This job closes that gap.
  build-faust-regional:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build faust-regional
        uses: docker/build-push-action@v4
        with:
          context: ./regional
          file: ./regional/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/faust-regional:latest
